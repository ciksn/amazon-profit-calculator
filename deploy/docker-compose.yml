services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-margingo}
      POSTGRES_USER: ${POSTGRES_USER:-margingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-margingo} -d ${POSTGRES_DB:-margingo}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4173
      DATABASE_URL: postgresql://${POSTGRES_USER:-margingo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-margingo}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      GEMINI_API_KEY_ENCRYPTED: ${GEMINI_API_KEY_ENCRYPTED:-}
      GEMINI_KEY_ENCRYPTION_KEY: ${GEMINI_KEY_ENCRYPTION_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-45000}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-2}
      GEMINI_HTTPS_PROXY: ${GEMINI_HTTPS_PROXY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "127.0.0.1:${APP_PORT:-4173}:4173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
